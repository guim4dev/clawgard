# Minimal skeleton — Plan 6 finalizes signing, checksums, homebrew, scoop.
version: 2
project_name: clawgard-buddy

builds:
  - id: clawgard-buddy
    main: ./cmd/clawgard-buddy
    binary: clawgard-buddy
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  disable: true # Plan 6 enables
