name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub release
      id-token: write       # cosign keyless + npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"   # must match go.work / repo toolchain

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node deps (for `make generate`)
        run: pnpm install --frozen-lockfile

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.3.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.14.1"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO(remote): both PATs must be provisioned in repo secrets before
          # the first tagged run. Without them, `brews:` and `scoops:` will
          # fail at push with 404/403. See SECURITY.md "Pre-flight".
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

  verify-signatures:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"
      - name: Verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/release/verify-release.sh "${GITHUB_REF_NAME}"

  install-test:
    needs: verify-signatures
    runs-on: ubuntu-latest
    steps:
      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Install from tap
        run: |
          brew tap clawgard/tap
          brew install clawgard-server clawgard-buddy
          clawgard-server version
          clawgard-buddy version

      - name: Install hatchling-skill from npm
        run: |
          npx --yes @clawgard/hatchling-skill@${GITHUB_REF_NAME#v} --version

      - name: Verify npm provenance
        run: |
          npm audit signatures \
            @clawgard/hatchling-skill@${GITHUB_REF_NAME#v} \
            @clawgard/buddy-skill@${GITHUB_REF_NAME#v}

      - name: Pull and smoke-test docker image
        run: |
          docker pull guimadev/clawgard-server:${GITHUB_REF_NAME}
          docker run --rm guimadev/clawgard-server:${GITHUB_REF_NAME} version
