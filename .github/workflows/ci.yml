name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install deps (node + oapi-codegen)
        run: make install
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build server
        run: |
          cd server
          go build ./...
      - name: Test server (unit + integration via testcontainers)
        run: |
          cd server
          go test -race ./...
      - name: Build Docker image
        run: |
          docker build -f server/Dockerfile -t clawgard-server:ci .

  hatchling-skill-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clawgard/hatchling-skill run typecheck
      - run: pnpm --filter @clawgard/hatchling-skill run build
      - run: pnpm --filter @clawgard/hatchling-skill run test

  buddy-cli-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: buddy-cli
        run: go build ./...
      - name: Unit tests
        working-directory: buddy-cli
        run: go test ./...
      - name: Cross-compile smoke (linux build from non-linux)
        if: matrix.os != 'ubuntu-latest'
        working-directory: buddy-cli
        run: GOOS=linux GOARCH=amd64 go build ./cmd/clawgard-buddy
        shell: bash

  buddy-skill-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clawgard/buddy-skill run typecheck
      - run: pnpm --filter @clawgard/buddy-skill run build
      - run: pnpm --filter @clawgard/buddy-skill run test

  verify-buddy-skill-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run injector tests only
        run: pnpm --filter @clawgard/buddy-skill exec vitest run tests/build-skill.test.ts
      - name: Assert hashes.ts in git is the empty-map template
        shell: bash
        run: |
          expected=$(cat <<'EOF'
          import type { PlatformKey } from "./platform.js";

          // GENERATED FILE — edits are overwritten by scripts-dev/build-skill.ts at publish time.
          // In the git repo this map is intentionally empty; publish-time injection fills it
          // from the matching `clawgard-buddy` GitHub release asset manifest.
          export type ExpectedHashes = Partial<Record<PlatformKey, string>>;
          export const EXPECTED_HASHES: ExpectedHashes = {};
          EOF
          )
          actual=$(cat skills/buddy-skill/src/lib/hashes.ts)
          if [ "$expected" != "$actual" ]; then
            echo "::error::skills/buddy-skill/src/lib/hashes.ts in git must be the empty-map template."
            echo "--- expected ---"
            echo "$expected"
            echo "--- actual ---"
            echo "$actual"
            exit 1
          fi
