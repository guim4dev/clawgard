name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install deps (node + oapi-codegen)
        run: make install
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build server
        run: |
          cd server
          go build ./...
      - name: Test server (unit + integration via testcontainers)
        run: |
          cd server
          go test -race ./...
      - name: Build Docker image
        run: |
          docker build -f server/Dockerfile -t clawgard-server:ci .

  hatchling-skill-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clawgard/hatchling-skill run typecheck
      - run: pnpm --filter @clawgard/hatchling-skill run build
      - run: pnpm --filter @clawgard/hatchling-skill run test
