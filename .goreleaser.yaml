version: 2

project_name: clawgard

env:
  - CGO_ENABLED=0
  - GO111MODULE=on

before:
  hooks:
    - go mod download
    - make generate

builds:
  - id: clawgard-server
    binary: clawgard-server
    main: ./cmd/clawgard-server
    dir: ./server
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: clawgard-buddy
    binary: clawgard-buddy
    main: ./cmd/clawgard-buddy
    dir: ./buddy-cli
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: clawgard-server
    ids: [clawgard-server]
    name_template: >-
      clawgard-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

  - id: clawgard-buddy
    ids: [clawgard-buddy]
    name_template: >-
      clawgard-buddy_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

brews:
  # TODO(remote): requires the `clawgard/homebrew-tap` repo to exist and the
  # `HOMEBREW_TAP_TOKEN` secret (fine-grained PAT, contents: read/write on the
  # tap repo) to be set in the main repo's Actions secrets. See SECURITY.md
  # "Pre-flight" section for provisioning + rotation. Until that repo exists
  # and the token is wired, the first real release run will fail at this step
  # — which is the correct signal to set the token before retrying.
  - name: clawgard-server
    ids: [clawgard-server]
    repository:
      owner: clawgard
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/clawgard/clawgard"
    description: "Self-hosted agent-to-agent knowledge-sharing relay server."
    license: "Apache-2.0"
    commit_author:
      name: clawgard-releaser
      email: release-bot@clawgard.dev
    test: |
      assert_match "clawgard-server version #{version}", shell_output("#{bin}/clawgard-server --version")
    install: |
      bin.install "clawgard-server"

  - name: clawgard-buddy
    ids: [clawgard-buddy]
    repository:
      owner: clawgard
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/clawgard/clawgard"
    description: "Clawgard buddy daemon — keeps a buddy agent connected to a relay."
    license: "Apache-2.0"
    commit_author:
      name: clawgard-releaser
      email: release-bot@clawgard.dev
    test: |
      assert_match "clawgard-buddy version #{version}", shell_output("#{bin}/clawgard-buddy --version")
    install: |
      bin.install "clawgard-buddy"

scoops:
  # TODO(remote): requires the `clawgard/scoop-bucket` repo and the
  # `SCOOP_BUCKET_TOKEN` secret (fine-grained PAT, contents: read/write on the
  # bucket repo). See SECURITY.md "Pre-flight" section. Until wired, the first
  # tagged release will fail at this step — correct signal to set up the
  # secret before retrying.
  - name: clawgard-server
    ids: [clawgard-server]
    repository:
      owner: clawgard
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/clawgard/clawgard"
    description: "Self-hosted agent-to-agent knowledge-sharing relay server."
    license: Apache-2.0
    commit_author:
      name: clawgard-releaser
      email: release-bot@clawgard.dev

  - name: clawgard-buddy
    ids: [clawgard-buddy]
    repository:
      owner: clawgard
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/clawgard/clawgard"
    description: "Clawgard buddy daemon."
    license: Apache-2.0
    commit_author:
      name: clawgard-releaser
      email: release-bot@clawgard.dev

signs:
  - id: cosign-archives
    cmd: cosign
    artifacts: archive
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
  - id: cosign-checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

docker_signs:
  - id: cosign-docker
    cmd: cosign
    artifacts: manifests
    args:
      - "sign"
      - "--yes"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "${artifact}@${digest}"

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.spdx.sbom.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: docker
    artifacts: package
    documents:
      - "{{ .ArtifactName }}.spdx.sbom.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

dockers:
  - id: server-amd64
    ids: [clawgard-server]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    extra_files:
      - scripts/entrypoint.sh
    image_templates:
      - "guimadev/clawgard-server:{{ .Version }}-amd64"
      - "guimadev/clawgard-server:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title=clawgard-server"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: server-arm64
    ids: [clawgard-server]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    extra_files:
      - scripts/entrypoint.sh
    image_templates:
      - "guimadev/clawgard-server:{{ .Version }}-arm64"
      - "guimadev/clawgard-server:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title=clawgard-server"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "guimadev/clawgard-server:{{ .Version }}"
    image_templates:
      - "guimadev/clawgard-server:{{ .Version }}-amd64"
      - "guimadev/clawgard-server:{{ .Version }}-arm64"
  - name_template: "guimadev/clawgard-server:latest"
    image_templates:
      - "guimadev/clawgard-server:latest-amd64"
      - "guimadev/clawgard-server:latest-arm64"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: Security
      regexp: '^.*?(feat|fix|chore)\(security\)!?:.+$'
      order: 2
    - title: Release / CI
      regexp: '^.*?(chore|ci|release)(\(.+\))?!?:.+$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: clawgard
    name: clawgard
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Clawgard {{ .Tag }}

    Signed, self-hosted agent-to-agent knowledge-sharing relay.

    **Verify any artifact:**
    ```bash
    scripts/release/verify-release.sh {{ .Tag }}
    ```
  footer: |
    ---
    **SBOMs:** every archive and image ships an SPDX SBOM beside it.
    **Signatures:** every archive, checksum file, and image is signed with Cosign keyless (Sigstore / Fulcio). See `SECURITY.md` for the supply-chain threat model.
