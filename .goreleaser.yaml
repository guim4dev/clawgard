version: 2

project_name: clawgard

env:
  - CGO_ENABLED=0
  - GO111MODULE=on

before:
  hooks:
    - go mod download
    - make generate

builds:
  - id: clawgard-server
    binary: clawgard-server
    main: ./cmd/clawgard-server
    dir: ./server
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: clawgard-buddy
    binary: clawgard-buddy
    main: ./cmd/clawgard-buddy
    dir: ./buddy-cli
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: clawgard-server
    ids: [clawgard-server]
    name_template: >-
      clawgard-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

  - id: clawgard-buddy
    ids: [clawgard-buddy]
    name_template: >-
      clawgard-buddy_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact.name}.spdx.sbom.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: docker
    artifacts: package
    documents:
      - "${artifact.name}.spdx.sbom.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

dockers:
  - id: server-amd64
    ids: [clawgard-server]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.server
    use: buildx
    image_templates:
      - "ghcr.io/clawgard/server:{{ .Version }}-amd64"
      - "ghcr.io/clawgard/server:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title=clawgard-server"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: server-arm64
    ids: [clawgard-server]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.server
    use: buildx
    image_templates:
      - "ghcr.io/clawgard/server:{{ .Version }}-arm64"
      - "ghcr.io/clawgard/server:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title=clawgard-server"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: buddy-amd64
    ids: [clawgard-buddy]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.buddy
    use: buildx
    image_templates:
      - "ghcr.io/clawgard/buddy:{{ .Version }}-amd64"
      - "ghcr.io/clawgard/buddy:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=clawgard-buddy"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: buddy-arm64
    ids: [clawgard-buddy]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.buddy
    use: buildx
    image_templates:
      - "ghcr.io/clawgard/buddy:{{ .Version }}-arm64"
      - "ghcr.io/clawgard/buddy:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=clawgard-buddy"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/clawgard/clawgard"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/clawgard/server:{{ .Version }}"
    image_templates:
      - "ghcr.io/clawgard/server:{{ .Version }}-amd64"
      - "ghcr.io/clawgard/server:{{ .Version }}-arm64"
  - name_template: "ghcr.io/clawgard/server:latest"
    image_templates:
      - "ghcr.io/clawgard/server:latest-amd64"
      - "ghcr.io/clawgard/server:latest-arm64"
  - name_template: "ghcr.io/clawgard/buddy:{{ .Version }}"
    image_templates:
      - "ghcr.io/clawgard/buddy:{{ .Version }}-amd64"
      - "ghcr.io/clawgard/buddy:{{ .Version }}-arm64"
  - name_template: "ghcr.io/clawgard/buddy:latest"
    image_templates:
      - "ghcr.io/clawgard/buddy:latest-amd64"
      - "ghcr.io/clawgard/buddy:latest-arm64"

# Placeholder release block; Task 9 replaces it with full changelog grouping
# and release template. Required so `goreleaser check` can resolve the SCM
# provider even before a git remote is configured (no-remote is an intentional
# deviation for this repo until the first tagged release).
release:
  github:
    owner: clawgard
    name: clawgard
